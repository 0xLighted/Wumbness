<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#98BC88" />
    <title>Offline | Wumbness</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        color-scheme: light;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
        background: linear-gradient(135deg, #fdfbf7 0%, #f5f3f0 100%);
        color: #2b2d42;
        padding: 1.5rem;
      }

      .container {
        max-width: 28rem;
        text-align: center;
      }

      .logo {
        margin-bottom: 2rem;
      }

      .logo img {
        width: 80px;
        height: 80px;
        filter: grayscale(30%);
      }

      .card {
        background: #ffffff;
        border-radius: 24px;
        padding: 2.5rem 1.5rem;
        box-shadow: 0 16px 40px rgba(43, 45, 66, 0.08);
        border: 1px solid rgba(152, 188, 136, 0.1);
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: #2b2d42;
      }

      p {
        font-size: 0.95rem;
        line-height: 1.6;
        color: #666;
        margin-bottom: 1.5rem;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(180, 91, 91, 0.1);
        color: #b45b5b;
        padding: 0.75rem 1rem;
        border-radius: 12px;
        font-size: 0.875rem;
        font-weight: 600;
      }

      .status::before {
        content: "";
        width: 8px;
        height: 8px;
        background: #b45b5b;
        border-radius: 50%;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .hint {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid #eee;
        font-size: 0.85rem;
        color: #999;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <svg width="80" height="80" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="45" fill="#98BC88" opacity="0.1" stroke="#98BC88" stroke-width="1" />
          <circle cx="50" cy="50" r="40" fill="none" stroke="#98BC88" stroke-width="2" />
          <path d="M35 45 Q40 35 50 35 Q60 35 65 45" fill="none" stroke="#98BC88" stroke-width="2.5" stroke-linecap="round" />
          <circle cx="42" cy="48" r="2.5" fill="#98BC88" />
          <circle cx="58" cy="48" r="2.5" fill="#98BC88" />
        </svg>
      </div>

      <div class="card">
        <h1>You're Offline</h1>
        <p>Wumboness requires an internet connection to connect you with support and real-time chat with your counselor.</p>
        <div class="status">No Connection</div>
        <div class="hint">
          Please check your internet connection and try again.
        </div>
      </div>
    </div>
  </body>
</html>
